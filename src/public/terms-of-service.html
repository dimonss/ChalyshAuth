<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service — ChalyshAuth</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --accent: #00b894;
            --accent2: #55efc4;
            --text: #e0e0e0;
            --muted: #8b8fa3;
            --border: #2d3043;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }

        .hero {
            background: linear-gradient(135deg, #1a1d27 0%, #0d3b2e 50%, #1a1d27 100%);
            padding: 60px 20px 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .hero .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .lang-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .lang-toggle button {
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .lang-toggle button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .lang-toggle button:hover:not(.active) {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px 32px;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .section:hover {
            border-color: var(--accent);
        }

        .section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent2);
            margin-bottom: 12px;
        }

        .section p, .section li {
            color: var(--muted);
            font-size: 0.92rem;
            margin-bottom: 8px;
        }

        .section ul {
            list-style: none;
            padding-left: 0;
        }

        .section ul li::before {
            content: '→';
            color: var(--accent);
            margin-right: 10px;
            font-weight: 600;
        }

        .effective-date {
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        @media (max-width: 600px) {
            .hero { padding: 40px 16px 28px; }
            .hero h1 { font-size: 1.6rem; }
            .container { padding: 24px 16px 40px; }
            .section { padding: 20px 20px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <h1 id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="lang-toggle">
        <button id="btn-en" onclick="setLang('en')">English</button>
        <button id="btn-ru" onclick="setLang('ru')">Русский</button>
    </div>
</div>

let currentLang = 'en';

function detectLang() {
    const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    return lang.startsWith('ru') ? 'ru' : 'en';
}

function setLang(lang) {
    currentLang = lang;
    render();
}

function render() {
    const t = i18n[currentLang];
    document.getElementById('title').textContent = t.title;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.documentElement.lang = currentLang;

    document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
    document.getElementById('btn-ru').classList.toggle('active', currentLang === 'ru');

    let html = '';
    for (const s of t.sections) {
        html += '<div class="section"><h2>' + s.heading + '</h2>';
        if (s.text) {
            html += '<p>' + s.text + '</p>';
        }
        if (s.list) {
            html += '<ul>';
            for (const item of s.list) {
                html += '<li>' + item + '</li>';
            }
            html += '</ul>';
        }
        html += '</div>';
    }
    html += '<p class="effective-date">' + t.effectiveDate + '</p>';
    document.getElementById('content').innerHTML = html;
}

// Init
currentLang = detectLang();
render();
